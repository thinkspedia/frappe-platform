# =============================================================================
# Frappe Platform — Local Development Stack
#
# Image: frappe/bench — bare bench CLI with pyenv/nvm, no pre-installed apps.
#
# The bench is initialised by the bootstrap service and lives at:
#   (host)      frappe_builder/development/frappe-bench/
#   (container) /workspace/development/frappe-bench/
#
# Because the bench is on the host filesystem (via the workspace bind-mount),
# app source code is directly editable without any per-app bind-mount tricks.
# Edit apps/hrms, apps/nusakura_app, etc. directly on the host — changes
# reflect immediately inside the container (same inode).
#
# Usage (from platform/ directory):
#   make dev-start         Start the full stack (bootstraps on first run)
#   make dev-logs          Follow all logs
#   make dev-shell         bash in frappe-web container
#   make dev-destroy       Wipe bench + MariaDB (full reset)
# =============================================================================

x-frappe: &frappe
  image: frappe/bench:${FRAPPE_BENCH_TAG:-latest}
  # Bench processes run from inside the bench directory.
  working_dir: /workspace/development/frappe-bench
  environment:
    FRAPPE_SITE_NAME: ${FRAPPE_SITE_NAME:-dev.localhost}
    DB_HOST: ${DB_HOST:-mariadb}
    DB_PORT: ${DB_PORT:-3306}
    DB_PASSWORD: ${DB_PASSWORD:-frappe}
    REDIS_CACHE: ${REDIS_CACHE:-redis-cache:6379}
    REDIS_QUEUE: ${REDIS_QUEUE:-redis-queue:6379}
    REDIS_SOCKETIO: ${REDIS_SOCKETIO:-redis-socketio:6379}
  volumes:
    # Mount the entire repo root so the bench (development/) and platform
    # scripts are all accessible from a single, stable path.
    - ..:/workspace:cached
  depends_on:
    bootstrap:
      condition: service_completed_successfully
  restart: unless-stopped

services:

  # ---------------------------------------------------------------------------
  # bootstrap — one-shot bench + site initialisation
  # First run  : bench init, get-app all apps, new-site, install-app, migrate.
  # Subsequent : detects existing site_config.json and exits 0 immediately.
  # ---------------------------------------------------------------------------
  bootstrap:
    image: frappe/bench:${FRAPPE_BENCH_TAG:-latest}
    working_dir: /workspace
    entrypoint: [bash, /workspace/platform/scripts/bootstrap.sh]
    environment:
      FRAPPE_SITE_NAME: ${FRAPPE_SITE_NAME:-dev.localhost}
      FRAPPE_BRANCH: ${FRAPPE_BRANCH:-version-16}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme}
      DB_PASSWORD: ${DB_PASSWORD:-frappe}
      REDIS_CACHE: ${REDIS_CACHE:-redis-cache:6379}
      REDIS_QUEUE: ${REDIS_QUEUE:-redis-queue:6379}
      REDIS_SOCKETIO: ${REDIS_SOCKETIO:-redis-socketio:6379}
      SITE_ADMIN_PASSWORD: ${SITE_ADMIN_PASSWORD:-changeme}
      HOST_NAME: ${HOST_NAME:-dev.localhost}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ..:/workspace:cached
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
      redis-socketio:
        condition: service_started
    restart: "no"

  # ---------------------------------------------------------------------------
  # nginx — single entry point on HTTP_PUBLISH_PORT (default 8000)
  # Routes /socket.io/ → websocket:9000, everything else → frappe-web:8001.
  # This is required: bench serve does not handle socket.io, and the browser
  # must hit a single port for both HTTP and WebSocket connections.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    # Not exposed directly — Traefik proxies to nginx:8000 on port 80.
    # Access the site at http://dev.localhost (no port number needed).
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frappe-web
      - websocket
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # frappe-web — werkzeug dev server via `bench serve`
  # Listens on internal port 8001 (nginx proxies to it).
  # bench serve includes SharedDataMiddleware which correctly serves /assets/.
  # bench serve auto-reloads on Python changes when developer_mode=1.
  # ---------------------------------------------------------------------------
  frappe-web:
    <<: *frappe
    command:
      - bash
      - -c
      - |
        cd /workspace/development/frappe-bench
        bench serve --port 8001
    # Not exposed directly — access via nginx on HTTP_PUBLISH_PORT

  # ---------------------------------------------------------------------------
  # websocket — Socket.IO
  # ---------------------------------------------------------------------------
  websocket:
    <<: *frappe
    command:
      - bash
      - -c
      - |
        export NVM_DIR="/home/frappe/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
        node /workspace/development/frappe-bench/apps/frappe/socketio.js
    ports:
      - "9000:9000"

  # ---------------------------------------------------------------------------
  # Celery workers
  # ---------------------------------------------------------------------------
  worker-default:
    <<: *frappe
    command: [bench, worker, --queue, default]

  worker-long:
    <<: *frappe
    command: [bench, worker, --queue, "long,default,short"]

  worker-short:
    <<: *frappe
    command: [bench, worker, --queue, "short,default"]

  # ---------------------------------------------------------------------------
  # scheduler — Celery Beat
  # ---------------------------------------------------------------------------
  scheduler:
    <<: *frappe
    command: [bench, schedule]

  # ---------------------------------------------------------------------------
  # mariadb
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme}
      MYSQL_USER: frappe
      MYSQL_PASSWORD: ${DB_PASSWORD:-frappe}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./scripts/mariadb.cnf:/etc/mysql/conf.d/frappe.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_ROOT_PASSWORD:-changeme}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — three isolated instances (cache, queue, socketio)
  # ---------------------------------------------------------------------------
  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped

  redis-socketio:
    image: redis:7-alpine
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # traefik — reverse proxy
  # App:       http://dev.localhost  (add 127.0.0.1 dev.localhost to /etc/hosts)
  # Dashboard: http://localhost:8082
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.0
    # Use file provider instead of Docker provider.
    # Docker Desktop (WSL2 + macOS) blocks the /events stream that the Docker
    # provider needs, causing continuous "Error response from daemon" log spam.
    # Static file routing is simpler and works identically on all platforms.
    #
    # The network alias HOST_NAME is placed here (not on nginx) so that
    # internal containers (e.g. websocket) resolve dev.localhost to Traefik
    # on port 80, matching webserver_port=80 in common_site_config. This
    # ensures Frappe builds email URLs as http://dev.localhost (no port suffix).
    networks:
      default:
        aliases:
          - ${HOST_NAME:-dev.localhost}
    command:
      - "--api.insecure=true"
      - "--providers.file.filename=/etc/traefik/routes.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    ports:
      # TRAEFIK_HTTP_PORT defaults to 80.
      # On Linux without root, set to a high port (e.g. 8080) in .env.
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8082}:8080"
    volumes:
      - ./traefik:/etc/traefik:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # adminer — lightweight MariaDB web UI
  # http://localhost:8081  (server: mariadb, user: root, pass: DB_ROOT_PASSWORD)
  # Profile: tools (enabled by default via Makefile COMPOSE_PROFILES)
  # Disable: add COMPOSE_PROFILES= to your .env
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    profiles: [tools]
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mariadb
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      - mariadb
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # mailpit — SMTP trap + web UI for testing outgoing email
  # Web UI:  http://localhost:8025
  # SMTP:    mailpit:1025  (configure in Frappe System Settings)
  # Profile: tools (enabled by default via Makefile COMPOSE_PROFILES)
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    profiles: [tools]
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

volumes:
  mariadb-data:
