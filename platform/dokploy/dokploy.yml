# =============================================================================
# dokploy.yml — Dokploy Production Deployment Manifest
#
# Dokploy is a compose-based deployment platform. This file defines the
# production service topology using the pre-built production image.
#
# Usage:
#   1. Push your image: org-bench build --tag v1.0.0
#   2. Set env vars in Dokploy dashboard (or .env on server)
#   3. Point Dokploy to this file as the compose source
#   4. Deploy via Dokploy dashboard or: org-bench deploy --env prod --tag v1.0.0
#
# All sensitive values (DB_PASSWORD, GITHUB_TOKEN, etc.) must be set as
# Dokploy environment variables — never hardcoded here.
# =============================================================================

x-frappe-prod: &frappe-prod
  image: ${IMAGE_REGISTRY:-ghcr.io/thinkspedia}/${IMAGE_NAME:-frappe-platform}:${IMAGE_TAG:-latest}
  restart: unless-stopped
  environment:
    FRAPPE_SITE_NAME: ${FRAPPE_SITE_NAME}
    HOST_NAME: ${HOST_NAME}
    DB_HOST: ${DB_HOST:-mariadb}
    DB_PORT: ${DB_PORT:-3306}
    DB_PASSWORD: ${DB_PASSWORD}
    REDIS_CACHE: ${REDIS_CACHE:-redis-cache:6379}
    REDIS_QUEUE: ${REDIS_QUEUE:-redis-queue:6379}
    REDIS_SOCKETIO: ${REDIS_SOCKETIO:-redis-socketio:6379}
    GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
    GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
  volumes:
    - frappe-sites:/home/frappe/frappe-bench/sites

services:

  # ---------------------------------------------------------------------------
  # configurator — one-shot: writes common_site_config.json and host_name.
  # Runs before all other services on each deploy.
  # ---------------------------------------------------------------------------
  configurator:
    <<: *frappe-prod
    command:
      - bash
      - -c
      - |
        bench set-config -g db_host "${DB_HOST}"
        bench set-config -gp db_port "${DB_PORT}"
        bench set-config -g redis_cache "redis://${REDIS_CACHE}"
        bench set-config -g redis_queue "redis://${REDIS_QUEUE}"
        bench set-config -g redis_socketio "redis://${REDIS_SOCKETIO}"
        bench set-config -gp socketio_port 9000
        /usr/local/bin/configure-site.sh
    restart: "no"
    depends_on:
      mariadb:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # migrator — runs bench migrate after configurator, before web.
  # Ensures the DB schema is up to date before traffic hits the new image.
  # ---------------------------------------------------------------------------
  migrator:
    <<: *frappe-prod
    command:
      - bash
      - -c
      - "bench --site ${FRAPPE_SITE_NAME} migrate"
    restart: "no"
    depends_on:
      configurator:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # backend — Gunicorn WSGI server
  # ---------------------------------------------------------------------------
  backend:
    <<: *frappe-prod
    command:
      - bash
      - -c
      - |
        gunicorn \
          --chdir=/home/frappe/frappe-bench/sites \
          --bind=0.0.0.0:8000 \
          --workers=${GUNICORN_WORKERS:-2} \
          --threads=${GUNICORN_THREADS:-4} \
          --timeout=${GUNICORN_TIMEOUT:-120} \
          frappe.app:application
    expose:
      - "8000"
    depends_on:
      migrator:
        condition: service_completed_successfully
    labels:
      - "dokploy.enable=true"

  # ---------------------------------------------------------------------------
  # websocket — Socket.IO server
  # ---------------------------------------------------------------------------
  websocket:
    <<: *frappe-prod
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    expose:
      - "9000"
    depends_on:
      migrator:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # frontend — Nginx reverse proxy (serves static assets + proxies to backend)
  # ---------------------------------------------------------------------------
  frontend:
    <<: *frappe-prod
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    ports:
      - "${HTTP_PUBLISH_PORT:-8080}:8080"
    depends_on:
      - backend
      - websocket
    labels:
      - "dokploy.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.frappe.rule=${SITES_RULE:-Host(`erp.example.com`)}"
      - "traefik.http.routers.frappe.entrypoints=websecure"
      - "traefik.http.routers.frappe.tls.certresolver=letsencrypt"

  # ---------------------------------------------------------------------------
  # Celery workers
  # ---------------------------------------------------------------------------
  queue-short:
    <<: *frappe-prod
    command: bench worker --queue short,default
    depends_on:
      migrator:
        condition: service_completed_successfully

  queue-long:
    <<: *frappe-prod
    command: bench worker --queue long,default,short
    depends_on:
      migrator:
        condition: service_completed_successfully

  scheduler:
    <<: *frappe-prod
    command: bench schedule
    depends_on:
      migrator:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # MariaDB — managed by Dokploy or external; configure via env vars
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: frappe
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped

  redis-socketio:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  frappe-sites:
  mariadb-data:
