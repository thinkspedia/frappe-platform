# =============================================================================
# Thinkspedia Frappe Platform — Dokploy Production Compose
#
# Deploy via: make deploy-dokploy tag=v1.2.3
#
# Dokploy handles SSL termination and domain routing externally.
# This compose exposes the frontend nginx on HTTP_PUBLISH_PORT (default 8888).
# Configure the domain in Dokploy UI → Project → Domain → point to that port.
#
# One-time tasks (set env var to 1, redeploy, then reset to 0):
#   CREATE_SITE=1  → provision a new Frappe site
#   MIGRATE=1      → run bench migrate with maintenance mode
# Configurator runs automatically on every deploy (always-on, fast, idempotent).
# =============================================================================

x-custom-image: &custom_image
  image: ${IMAGE_REGISTRY}/nusakuraerp:${IMAGE_TAG:-latest}
  pull_policy: ${PULL_POLICY:-always}
  restart: unless-stopped

x-bench-volume: &bench_volume
  volumes:
    - sites:/home/frappe/frappe-bench/sites

x-network: &network
  networks:
    - bench-network

x-depends-configurator: &depends_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully
      required: true

services:

  # ---------------------------------------------------------------------------
  # configurator — runs on every deploy: writes common_site_config.json
  # Uses direct Python JSON to avoid bench/frappe import overhead and DB hangs.
  # ---------------------------------------------------------------------------
  configurator:
    <<: [*custom_image, *bench_volume, *network]
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        ls -1 apps > sites/apps.txt
        python3 -c "
        import json, os, sys
        p = 'sites/common_site_config.json'
        try:
            c = json.load(open(p))
        except Exception:
            c = {}
        c.update({
            'db_host': os.environ.get('DB_HOST', 'db'),
            'db_port': int(os.environ.get('DB_PORT', 3306)),
            'redis_cache': 'redis://' + os.environ.get('REDIS_CACHE', 'redis-cache:6379'),
            'redis_queue': 'redis://' + os.environ.get('REDIS_QUEUE', 'redis-queue:6379'),
            'redis_socketio': 'redis://' + os.environ.get('REDIS_QUEUE', 'redis-queue:6379'),
            'socketio_port': 9000,
            'webserver_port': 80,
            'server_script_enabled': 1,
            'chromium_path': '/usr/bin/chromium-headless-shell',
        })
        open(p, 'w').write(json.dumps(c, indent=2))
        print('[configurator] common_site_config.json written')
        sn = os.environ.get('SITE_NAME', '')
        sh = os.environ.get('SITE_HOST_NAME', '')
        if sn and sh:
            sp = 'sites/' + sn + '/site_config.json'
            if os.path.exists(sp):
                sc = json.load(open(sp))
                sc['host_name'] = sh
                open(sp, 'w').write(json.dumps(sc, indent=2))
                print('[configurator] host_name updated in ' + sp)
        print('[configurator] Done')
        "
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      REDIS_CACHE: ${REDIS_CACHE:-redis-cache:6379}
      REDIS_QUEUE: ${REDIS_QUEUE:-redis-queue:6379}
      SITE_NAME: ${SITE_NAME:-}
      SITE_HOST_NAME: ${SITE_HOST_NAME:-}
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # create-site — opt-in: set CREATE_SITE=1 to provision a new site (once only)
  # Conditional logic is handled inside the command (not via deploy.replicas)
  # so this works with plain docker compose, Dokploy, and future Nomad deployments.
  # ---------------------------------------------------------------------------
  create-site:
    <<: [*custom_image, *bench_volume, *network]
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - >
        [ "$${CREATE_SITE}" != "1" ] && echo "[create-site] Skipped (CREATE_SITE != 1)" && exit 0;
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1;
          fi;
        done;
        echo "sites/common_site_config.json found";
        [[ -d "sites/$${SITE_NAME}" ]] && echo "$${SITE_NAME} already exists" && exit 0;
        bench new-site \
          --mariadb-user-host-login-scope='%' \
          --admin-password=$${ADMIN_PASSWORD} \
          --db-root-username=root \
          --db-root-password=$${DB_ROOT_PASSWORD} \
          $${INSTALL_APP_ARGS} \
          $${SITE_NAME};
    environment:
      CREATE_SITE: ${CREATE_SITE:-0}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      INSTALL_APP_ARGS: ${INSTALL_APP_ARGS:---install-app erpnext}
      SITE_NAME: ${SITE_NAME}

  # ---------------------------------------------------------------------------
  # migration — opt-in: set MIGRATE=1 to run bench migrate with maintenance mode
  # Conditional logic is handled inside the command (not via deploy.replicas)
  # so this works with plain docker compose, Dokploy, and future Nomad deployments.
  # ---------------------------------------------------------------------------
  migration:
    <<: [*custom_image, *bench_volume, *network]
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - >
        [ "$${MIGRATE}" != "1" ] && echo "[migration] Skipped (MIGRATE != 1)" && exit 0;
        if [ -z "$$(find sites -mindepth 2 -maxdepth 2 -name site_config.json 2>/dev/null)" ]; then
          echo "[migration] No sites found — skipping";
          exit 0;
        fi;
        echo "[migration] Enabling maintenance mode...";
        bench --site all set-config -p maintenance_mode 1;
        bench --site all set-config -p pause_scheduler 1;
        echo "[migration] Running bench migrate...";
        bench --site all migrate;
        echo "[migration] Disabling maintenance mode...";
        bench --site all set-config -p maintenance_mode 0;
        bench --site all set-config -p pause_scheduler 0;
    environment:
      MIGRATE: ${MIGRATE:-0}

  # ---------------------------------------------------------------------------
  # backend — Gunicorn workers (Frappe WSGI)
  # ---------------------------------------------------------------------------
  backend:
    <<: [*custom_image, *bench_volume, *depends_configurator]
    networks:
      - bench-network
      - default          # shared with frontend (Dokploy forces port-exposed services onto default)
    environment:
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    healthcheck:
      test: ["CMD", "wait-for-it", "0.0.0.0:8000"]
      interval: 2s
      timeout: 10s
      retries: 30

  # ---------------------------------------------------------------------------
  # frontend — nginx: serves assets, proxies /socket.io → websocket
  # ---------------------------------------------------------------------------
  frontend:
    <<: [*custom_image, *bench_volume, *network]
    entrypoint: ["bash", "-c"]
    command:
      - >
        wait-for-it -t 120 backend:8000;
        wait-for-it -t 120 websocket:9000;
        exec /usr/local/bin/entrypoint.sh nginx-entrypoint.sh
    depends_on:
      backend:
        condition: service_started
        required: true
      websocket:
        condition: service_started
        required: true
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    ports:
      - "${HTTP_PUBLISH_PORT:-8888}:8080"
    healthcheck:
      test: ["CMD", "wait-for-it", "0.0.0.0:8080"]
      interval: 2s
      timeout: 30s
      retries: 30

  # ---------------------------------------------------------------------------
  # websocket — Socket.IO node server
  # ---------------------------------------------------------------------------
  websocket:
    <<: [*custom_image, *bench_volume, *depends_configurator]
    networks:
      - bench-network
      - default          # shared with frontend (Dokploy forces port-exposed services onto default)
    command: [node, /home/frappe/frappe-bench/apps/frappe/socketio.js]
    healthcheck:
      test: ["CMD", "wait-for-it", "0.0.0.0:9000"]
      interval: 2s
      timeout: 10s
      retries: 30

  # ---------------------------------------------------------------------------
  # queues — background job workers (three tiers)
  # ---------------------------------------------------------------------------
  queue-default:
    <<: [*custom_image, *bench_volume, *network, *depends_configurator]
    command: [bench, worker, --queue, default]
    healthcheck:
      test: ["CMD", "wait-for-it", "redis-queue:6379"]
      interval: 2s
      timeout: 10s
      retries: 30

  queue-short:
    <<: [*custom_image, *bench_volume, *network, *depends_configurator]
    command: [bench, worker, --queue, short]
    healthcheck:
      test: ["CMD", "wait-for-it", "redis-queue:6379"]
      interval: 2s
      timeout: 10s
      retries: 30

  queue-long:
    <<: [*custom_image, *bench_volume, *network, *depends_configurator]
    command: [bench, worker, --queue, long]
    healthcheck:
      test: ["CMD", "wait-for-it", "redis-queue:6379"]
      interval: 2s
      timeout: 10s
      retries: 30

  # ---------------------------------------------------------------------------
  # scheduler — periodic task runner
  # ---------------------------------------------------------------------------
  scheduler:
    <<: [*custom_image, *bench_volume, *network, *depends_configurator]
    command: [bench, schedule]
    healthcheck:
      test: ["CMD", "wait-for-it", "redis-queue:6379"]
      interval: 2s
      timeout: 10s
      retries: 30

  # ---------------------------------------------------------------------------
  # db — MariaDB
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:10.6
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysql", "-u", "root", "-p${DB_ROOT_PASSWORD}", "-e", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 10s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
      - --wait-timeout=28800
      - --interactive-timeout=28800
      - --max-allowed-packet=67108864
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - bench-network

  # ---------------------------------------------------------------------------
  # redis — cache and queue (socketio shares queue)
  # ---------------------------------------------------------------------------
  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

volumes:
  db-data:
  redis-cache-data:
  redis-queue-data:
  sites:

networks:
  bench-network:
  default:              # project default network; Dokploy places port-exposed services here
