# =============================================================================
# Thinkspedia Frappe Platform — Dokploy Production Compose
#
# Deploy via: make deploy-dokploy tag=v1.2.3
#
# Dokploy handles SSL termination and domain routing externally.
# This compose exposes the frontend nginx on HTTP_PUBLISH_PORT (default 8080).
# Configure the domain in Dokploy UI → Project → Domain → point to port 8080.
#
# First-time site creation (run once after first deploy):
#   make prod-new-site
# =============================================================================

x-image: &image
  image: ${IMAGE_REGISTRY}/nusakuraerp:${IMAGE_TAG:-latest}
  pull_policy: ${PULL_POLICY:-always}
  restart: ${RESTART_POLICY:-unless-stopped}

x-nginx-image: &nginx_image
  image: frappe/erpnext:${FRAPPE_BRANCH:-version-16}
  pull_policy: ${PULL_POLICY:-always}
  restart: ${RESTART_POLICY:-unless-stopped}

x-depends-configurator: &depends_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-bench-volume: &bench_volume
  volumes:
    - sites:/home/frappe/frappe-bench/sites

services:

  # ---------------------------------------------------------------------------
  # configurator — one-shot: writes common_site_config.json on every `up`
  # ---------------------------------------------------------------------------
  configurator:
    <<: [*image, *bench_volume]
    platform: linux/amd64
    entrypoint: [bash, -c]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port 9000;
        bench set-config -gp webserver_port 80;
        bench set-config -g server_script_enabled 1;
        bench set-config -g chromium_path /usr/bin/chromium-headless-shell;
        if [ -n "$$SITE_NAME" ] && [ -f "sites/$$SITE_NAME/site_config.json" ]; then
          bench --site $$SITE_NAME set-config host_name "$$SITE_HOST_NAME";
        fi;
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      REDIS_CACHE: ${REDIS_CACHE:-redis-cache:6379}
      REDIS_QUEUE: ${REDIS_QUEUE:-redis-queue:6379}
      SITE_NAME: ${FRAPPE_SITE_NAME_HEADER:-}
      SITE_HOST_NAME: ${SITE_HOST_NAME:-https://${FRAPPE_SITE_NAME_HEADER:-}}
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: on-failure

  # ---------------------------------------------------------------------------
  # migrator — one-shot: runs bench migrate on every deploy
  # ---------------------------------------------------------------------------
  migrator:
    <<: [*image, *depends_configurator, *bench_volume]
    platform: linux/amd64
    entrypoint: [bash, -c]
    command:
      - >
        if [ "$$MIGRATE_SITES" != "true" ]; then
          echo "[migrator] Migration disabled — skipping";
          exit 0;
        fi;
        if [ -z "$$(find sites -mindepth 2 -maxdepth 2 -name site_config.json 2>/dev/null)" ]; then
          echo "[migrator] No sites found — skipping";
          exit 0;
        fi;
        echo "[migrator] Running bench migrate --skip-failing...";
        bench --site all migrate;
    environment:
      MIGRATE_SITES: ${MIGRATE_SITES:-true}
    restart: on-failure:5

  # ---------------------------------------------------------------------------
  # backend — Gunicorn workers (Frappe WSGI)
  # ---------------------------------------------------------------------------
  backend:
    <<: [*image, *depends_configurator, *bench_volume]
    platform: linux/amd64
    environment:
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    depends_on:
      configurator:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # frontend — nginx: serves assets, proxies /socket.io → websocket, rest → backend
  # ---------------------------------------------------------------------------
  frontend:
    <<: *nginx_image
    platform: linux/amd64
    command: [nginx-entrypoint.sh]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    ports:
      - "${HTTP_PUBLISH_PORT:-8888}:8080"
    depends_on:
      - backend
      - websocket

  # ---------------------------------------------------------------------------
  # websocket — Socket.IO node server
  # ---------------------------------------------------------------------------
  websocket:
    <<: [*image, *depends_configurator, *bench_volume]
    platform: linux/amd64
    command: [node, /home/frappe/frappe-bench/apps/frappe/socketio.js]

  # ---------------------------------------------------------------------------
  # queues — background job workers
  # ---------------------------------------------------------------------------
  queue-short:
    <<: [*image, *depends_configurator, *bench_volume]
    platform: linux/amd64
    command: bench worker --queue short,default

  queue-long:
    <<: [*image, *depends_configurator, *bench_volume]
    platform: linux/amd64
    command: bench worker --queue long,default,short

  # ---------------------------------------------------------------------------
  # scheduler — periodic task runner
  # ---------------------------------------------------------------------------
  scheduler:
    <<: [*image, *depends_configurator, *bench_volume]
    platform: linux/amd64
    command: bench schedule

  # ---------------------------------------------------------------------------
  # db — MariaDB
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:10.6
    platform: linux/amd64
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--password=${DB_ROOT_PASSWORD:-change_me}"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - db-data:/var/lib/mysql

  # ---------------------------------------------------------------------------
  # redis — cache and queue (two separate instances)
  # ---------------------------------------------------------------------------
  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

volumes:
  sites:
  db-data:
  redis-queue-data:
