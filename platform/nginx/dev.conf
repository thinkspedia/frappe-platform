upstream frappe-web {
    server frappe-web:8001;
}

upstream frappe-socketio {
    server websocket:9000;
}

server {
    listen 8000;
    server_name _;

    client_max_body_size 50m;

    # Socket.IO — must come before the catch-all
    location /socket.io/ {
        # Frappe's authenticate.js compares get_hostname(host) vs get_hostname(origin).
        # Browsers omit Origin on same-origin HTTP requests (socket.io polling phase),
        # causing get_hostname(undefined) = undefined → "Invalid origin".
        # Inject Origin from the request host when the browser doesn't send it.
        set $origin_header $http_origin;
        if ($origin_header = "") {
            set $origin_header $scheme://$host;
        }

        proxy_pass http://frappe-socketio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin $origin_header;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Everything else → bench serve
    location / {
        proxy_pass http://frappe-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
